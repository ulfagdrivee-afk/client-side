<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peta Rute Indonesia Fullscreen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <h2>Find Route</h2>
      
      <div class="input-container">
        <div class="input-wrapper">
          <span class="input-icon">📍</span>
          <input type="text" id="fromInput" placeholder="Asal (cth: surabaya)">
        </div>
        <div class="input-wrapper">
          <span class="input-icon">📍</span>
          <input type="text" id="toInput" placeholder="Tujuan (cth: kalimantan)">
        </div>
      </div>

      <button id="searchRouteBtn" disabled>Search</button>

      <div class="sort-bar">
        <span class="sort-label">Sort By</span>
        <div class="sort-options">
          <button class="sort-btn active" data-sort="fastest">Fastest</button>
          <button class="sort-btn" data-sort="cheapest">Cheapest</button>
        </div>
      </div>

      <div id="routeResults" class="results-container"></div>
    </div>

    <div id="map-container">
      <div id="map-content">
        <img src="indonesia.png" alt="Peta Indonesia" class="map-bg" draggable="false">
        <svg id="line-layer"></svg>
      </div>
    </div>
  </div>

  <div id="popup" class="modal-popup hidden">
    <div class="popup-header">
      <h3>Add pinpoint</h3>
      <button id="cancelBtn" class="close-x">&times;</button>
    </div>
    <input type="text" id="locationName" placeholder="Enter location name">
  </div>

  <div id="connectPopup" class="dialog-card hidden">
    <div class="popup-header">
      <h3>Connect</h3>
      <button id="connectCancelBtn" class="close-x">&times;</button>
    </div>
    <div class="dialog-body">
      <input type="number" id="distanceInput" placeholder="Enter distance (km)" min="1">
      <select id="transportSelect">
        <option value="train">Kereta (Hijau)</option>
        <option value="bus">Bus (Ungu)</option>
        <option value="plane">Pesawat (Hitam)</option>
      </select>
      <button id="connectSaveBtn">Submit</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
