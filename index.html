<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peta Rute Indonesia Fullscreen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <h2>Find Route</h2>
      <div class="input-group">
        <label for="fromInput">📍 Asal:</label>
        <input type="text" id="fromInput" placeholder="From Pinpoint">
      </div>
      <div class="input-group">
        <label for="toInput">📍 Tujuan:</label>
        <input type="text" id="toInput" placeholder="To Pinpoint">
      </div>
      <button id="searchRouteBtn" disabled>Search</button>
  
      <div class="sort-bar">
        <span>Sort By</span>
        <button class="active" data-sort="fastest" id="sortFastestBtn">Fastest</button>
        <button data-sort="cheapest" id="sortCheapestBtn">Cheapest</button>
      </div>

      <div id="routeResults"></div>
    </div>

    <div id="map-container">
      <div id="map-content">
        <img src="indonesia.svg" alt="Peta Indonesia" class="map-bg" draggable="false">
        <svg id="line-layer"></svg>
      </div>
    </div>
  </div>

  <div id="popup" class="modal-popup hidden">
    <div class="popup-header">
      <h3>Add pinpoint</h3>
      <button id="cancelBtn" class="close-x">&times;</button>
    </div>
    <input type="text" id="locationName" placeholder="Enter location name">
  </div>

  <div id="connectPopup" class="dialog-card hidden">
    <div class="popup-header">
      <h3>Connect</h3>
      <button id="connectCancelBtn" class="close-x">&times;</button>
    </div>
    <div class="dialog-body-horizontal">
      <input type="number" id="distanceInput" placeholder="Enter distance (km)" min="1">
      <select id="transportSelect">
        <option value="" disabled selected hidden>Choose mode</option>
        <option value="train">Kereta</option>
        <option value="bus">Bus</option>
        <option value="plane">Pesawat</option>
      </select>
    </div>
    <div class="popup-footer">
      <button id="connectSaveBtn">Submit</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
